name: 'Build Alpha'
run-name: 'alpha-${{ inputs.platform }}-v${{ inputs.version }}'
on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台'
        required: true
        type: choice
        options:
          - 'macos-aarch64'
          - 'macos-x86_64'
          - 'ubuntu-22.04'
          - 'windows-latest'
          - 'all'
        default: 'all'
      version:
        description: 'Alpha 版本号 (例如: 1.0.0-alpha.1)'
        required: true
        type: string
        default: '0.0.0-alpha.1'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          # Linux 构建走 debian:bookworm 容器 (glibc 2.36),其他 platform 在
          # host runner 直接跑。详见 build.yml 同名 step 注释。
          if [ "${{ inputs.platform }}" == "all" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"},{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"},{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":"","container":"debian:bookworm"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]' >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.platform }}" == "macos-aarch64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.platform }}" == "macos-x86_64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.platform }}" == "ubuntu-22.04" ]; then
            echo 'matrix=[{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":"","container":"debian:bookworm"}]' >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.platform }}" == "windows-latest" ]; then
            echo 'matrix=[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]' >> "$GITHUB_OUTPUT"
          fi

  build-alpha:
    name: Build ${{ matrix.target }}
    needs: setup-matrix
    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container || null }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Install container deps (Linux)
        if: matrix.container != ''
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl wget ca-certificates xz-utils unzip sudo \
            build-essential pkg-config cmake clang \
            libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            file desktop-file-utils \
            xdg-utils

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Prepend cargo bin to PATH
        # 见 build.yml 同名 step 注释:绕开 macos-15-arm64 image 20260511+
        # Homebrew rustup 多链导致 `cargo metadata` 落到 rustup-init 的问题。
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: ${{ matrix.target }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install frontend dependencies
        run: bun install

      - name: build alpha release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_APP_VERSION: ${{ inputs.version }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: alpha
          # Backend Sentry DSN — independent Rust project DSN.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          APP_ENV: alpha
          # Frontend sourcemap upload via @sentry/vite-plugin during vite build.
          # VITE_SENTRY_PROJECT is the front-end Sentry project slug — MUST be
          # different from SENTRY_PROJECT (back-end). Plugin no-ops when token
          # or project is missing.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          VITE_SENTRY_PROJECT: ${{ secrets.VITE_SENTRY_PROJECT }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: UniClipboard Alpha v${{ inputs.version }}
          releaseBody: Alpha build for testing.
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload Sentry debug symbols
        # 把 release 编译出的 .dSYM / .pdb / DWARF 上传给 Sentry,后续 panic
        # 上报时 Sentry 用 build-id 把地址翻译回函数 + 文件 + 行号(配合
        # --include-sources 还会嵌源码片段)。SENTRY_AUTH_TOKEN/SENTRY_PROJECT
        # 缺失时整个 step 跳过,不阻断 alpha 构建。
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN/SENTRY_PROJECT not configured — skipping debug-files upload"
            exit 0
          fi
          npm install -g @sentry/cli
          if [ -d "src-tauri/target/${{ matrix.target }}/release" ]; then
            TARGET_DIR="src-tauri/target/${{ matrix.target }}/release"
          elif [ -d "src-tauri/target/release" ]; then
            TARGET_DIR="src-tauri/target/release"
          else
            echo "::warning::No release directory found — skipping"
            exit 0
          fi
          echo "Uploading debug files from $TARGET_DIR"
          sentry-cli debug-files upload --include-sources "$TARGET_DIR"
