name: 'Build CLI'
run-name: "build-cli-${{ inputs.platform || 'all' }}-${{ github.run_number }}"
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select build platform'
        required: true
        type: choice
        options:
          - 'macos-aarch64'
          - 'macos-x86_64'
          - 'ubuntu-22.04'
          - 'ubuntu-22.04-arm'
          - 'windows-latest'
          - 'all'
        default: 'all'
      save_cache:
        description: '是否保存构建缓存(用于手动验证 cache warmup)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      platform:
        description: 'Select build platform'
        required: false
        type: string
        default: 'all'
      branch:
        description: 'Branch to build'
        required: false
        type: string
        default: ''
      save_cache:
        description: '是否保存构建缓存'
        required: false
        type: boolean
        default: false

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          # CLI Linux target 选 musl 静态编译:
          # uc-cli 走 ring + rustls (无 aws-lc-sys / 无 openssl-sys),依赖图
          # 里没有 C 库,musl 静态链可以一气呵成,glibc 完全无关。产物可直接
          # 在任意 Linux (包括 Ubuntu 20.04 / Alpine / 老 RHEL) 上跑。
          # 容器仍用 debian:bookworm 拿 musl-tools / cmake / clang 工具链。
          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" == "all" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"},{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"},{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-musl","args":"--target x86_64-unknown-linux-musl","container":"ghcr.io/uniclipboard/build-bookworm:latest"},{"platform":"ubuntu-22.04-arm","target":"aarch64-unknown-linux-musl","args":"--target aarch64-unknown-linux-musl","container":"ghcr.io/uniclipboard/build-bookworm:latest"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "macos-aarch64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "macos-x86_64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "ubuntu-22.04" ]; then
            echo 'matrix=[{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-musl","args":"--target x86_64-unknown-linux-musl","container":"ghcr.io/uniclipboard/build-bookworm:latest"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "ubuntu-22.04-arm" ]; then
            echo 'matrix=[{"platform":"ubuntu-22.04-arm","target":"aarch64-unknown-linux-musl","args":"--target aarch64-unknown-linux-musl","container":"ghcr.io/uniclipboard/build-bookworm:latest"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "windows-latest" ]; then
            echo 'matrix=[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]' >> "$GITHUB_OUTPUT"
          else
            echo "Error: Unknown platform '$PLATFORM'. Valid options: all, macos-aarch64, macos-x86_64, ubuntu-22.04, ubuntu-22.04-arm, windows-latest"
            exit 1
          fi

  build-cli:
    name: Build CLI ${{ matrix.target }}
    needs: setup-matrix
    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      # Linux 容器走预构建镜像 (.github/docker/build-bookworm.Dockerfile),
      # 含 musl-tools / build-essential / clang / cmake 等 CLI 编译所需 + Tauri 桌面端依赖。
      # 镜像由 build-base-image.yml 维护。

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Linux 走 musl,需要 rustup 装对应 musl target;
          # macOS 装两个 darwin target;Windows host=msvc 装 noop。
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Prepend cargo bin to PATH
        # 见 build.yml 同名 step 注释:绕开 macos-15-arm64 image 20260511+
        # Homebrew rustup 多链导致 `cargo` 落到 rustup-init 的问题。
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - name: ensure rust target installed on pinned toolchain
        # src-tauri/rust-toolchain.toml 把 cargo 锁到一个具体 channel,
        # 跟 dtolnay 装的 stable 是两个独立 toolchain。CLI build 也在
        # src-tauri/ 下跑 cargo,必须把 target 装到 pinned channel,否则
        # 与 build.yml 一样会报 `Target ... is not installed`。
        # 见 dtolnay/rust-toolchain#75。Windows host=msvc 不用装。
        shell: bash
        run: |
          TC=$(cd src-tauri && rustup show active-toolchain | awk '{print $1}')
          echo "pinned toolchain: $TC"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            rustup target add --toolchain "$TC" aarch64-apple-darwin x86_64-apple-darwin
          elif [ -n "${{ matrix.target }}" ] && [ "${{ matrix.target }}" != "x86_64-pc-windows-msvc" ]; then
            rustup target add --toolchain "$TC" "${{ matrix.target }}"
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: cli-${{ matrix.target }}
          # 只在 main 写缓存,tag/PR 只读。详见 build.yml 同名 step 的注释。
          save-if: ${{ inputs.save_cache || github.ref == 'refs/heads/main' }}

      - name: build CLI binary
        working-directory: src-tauri
        # musl 链接器 + ring/cc-rs 的 C 编译器都指到 musl-gcc,产物完全静态,
        # 不再链 host glibc。其他 platform 这两个 env 是 noop。
        #
        # `-C relocation-model=static` 禁用 PIE。Rust 1.71+ 的
        # x86_64-unknown-linux-musl target 默认 position-independent-executables=true,
        # 即使全静态链 (ldd 报 "statically linked",无 DT_NEEDED) 仍会写入
        # PT_INTERP=/lib/ld-musl-x86_64.so.1。glibc 主机上没有该 loader,
        # execve 直接 ENOENT,shell 报 "no such file or directory" (但报的是
        # 二进制本身,因为内核没法把 errno 区分成 "interpreter 找不到")。
        # 关掉 PIE 后产物变成无 PT_INTERP 的经典 static ELF,任意 Linux x86_64
        # (glibc / musl) 都能直接 exec。这才符合 ace8685f 切 musl 的初衷。
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          # aarch64 Debian bookworm 上 gcc-12 默认开启 -moutline-atomics,
          # vendored libdbus-sys 的 C 代码 (`dbus-sysdeps-unix.c` 里
          # `_dbus_atomic_inc/dec` 走 __sync_fetch_and_add) 会被编译成对
          # `__aarch64_ldadd4_sync` 等 helper 的外调。这些 helper 由 libgcc
          # 提供,但 Rust 给 musl target 的链接行带 `-nodefaultlibs`,只显式
          # 链 `-lunwind -lc`,libgcc 不在链接行里,导致 `undefined reference
          # to __aarch64_ldadd4_sync` (CI run 25669103371)。关掉 outline
          # atomics 让 gcc 直接 inline LSE/LL-SC 指令,绕开 libgcc helper。
          # x86_64 没有这套机制,留空即可。
          CFLAGS_aarch64_unknown_linux_musl: "-mno-outline-atomics"
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C relocation-model=static"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C relocation-model=static"
        run: cargo build --release -p uc-cli ${{ matrix.args }}

      - name: import Apple certificate (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: sign CLI binary (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          # Extract signing identity from imported certificate
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No Developer ID Application identity found in keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Signing with: $IDENTITY"

          TARGET="${{ matrix.target }}"
          BIN_NAME="uniclip"
          BIN_PATH="src-tauri/target/${TARGET}/release/${BIN_NAME}"
          if [ ! -f "$BIN_PATH" ]; then
            BIN_PATH="src-tauri/target/release/${BIN_NAME}"
          fi

          codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$BIN_PATH"
          codesign --verify --verbose "$BIN_PATH"

      - name: notarize CLI binary (macOS only)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          TARGET="${{ matrix.target }}"
          BIN_NAME="uniclip"
          BIN_PATH="src-tauri/target/${TARGET}/release/${BIN_NAME}"
          if [ ! -f "$BIN_PATH" ]; then
            BIN_PATH="src-tauri/target/release/${BIN_NAME}"
          fi

          # notarytool requires a zip archive
          NOTARIZE_ZIP="$RUNNER_TEMP/cli-notarize.zip"
          ditto -c -k --keepParent "$BIN_PATH" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Note: stapler staple only works on .app/.dmg/.pkg bundles, not bare binaries.
          # For standalone CLI binaries, Gatekeeper checks the notarization ticket online.

      - name: package CLI binary
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARGET="${{ matrix.target }}"
          BIN_NAME="uniclip"

          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            BIN_SRC="src-tauri/target/release/${BIN_NAME}.exe"
            # Windows non-cross build puts binary in target/release/, not target/{target}/release/
            if [ ! -f "$BIN_SRC" ]; then
              BIN_SRC="src-tauri/target/${TARGET}/release/${BIN_NAME}.exe"
            fi
            ARCHIVE="uniclipboard-cli-${VERSION}-${TARGET}.zip"
            7z a "$ARCHIVE" "$BIN_SRC"
          else
            BIN_DIR="src-tauri/target/${TARGET}/release"
            # Fallback for non-cross builds
            if [ ! -f "${BIN_DIR}/${BIN_NAME}" ]; then
              BIN_DIR="src-tauri/target/release"
            fi
            ARCHIVE="uniclipboard-cli-${VERSION}-${TARGET}.tar.gz"
            tar -czf "$ARCHIVE" -C "$BIN_DIR" "$BIN_NAME"
          fi
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: uniclipboard-cli-*

      - name: cleanup keychain (macOS only)
        if: matrix.platform == 'macos-latest' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
