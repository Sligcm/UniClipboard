name: 'Build Tauri App'
run-name: "build-${{ inputs.platform || 'all' }}-${{ github.run_number }}"
on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择构建平台'
        required: true
        type: choice
        options:
          - 'macos-aarch64'
          - 'macos-x86_64'
          - 'ubuntu-22.04'
          - 'ubuntu-22.04-arm'
          - 'windows-latest'
          - 'windows-x86_64'
          - 'windows-arm64'
          - 'all'
        default: 'all'
      channel:
        description: '发布渠道(决定 Sentry/OTLP environment 标签)'
        required: false
        type: choice
        options:
          - 'stable'
          - 'alpha'
          - 'beta'
          - 'rc'
        default: 'stable'
      save_cache:
        description: '是否保存构建缓存(用于手动验证 cache warmup)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      platform:
        description: '选择构建平台'
        required: false
        type: string
        default: 'all'
      branch:
        description: 'Branch to build'
        required: false
        type: string
        default: ''
      channel:
        description: '发布渠道,决定 APP_ENV/VITE_APP_ENV 注入值(stable→production,其他→channel 原样)'
        required: false
        type: string
        default: 'stable'
      save_cache:
        description: '是否保存构建缓存'
        required: false
        type: boolean
        default: false

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          # Linux 构建在 host=ubuntu-22.04 / ubuntu-22.04-arm 上启容器跑
          # (debian:bookworm, glibc 2.36),其他 platform (macOS/Windows) 不带
          # container 字段 → 直接在 host runner 跑。
          # aarch64 走 native arm runner (ubuntu-22.04-arm),避免在 x86 容器里
          # cross-compile webkit/gtk 栈;x86_64 仍在 ubuntu-22.04。
          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" == "all" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"},{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"},{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":"","container":"ghcr.io/uniclipboard/build-bookworm:latest"},{"platform":"ubuntu-22.04-arm","target":"aarch64-unknown-linux-gnu","args":"","container":"ghcr.io/uniclipboard/build-bookworm:latest"},{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""},{"platform":"windows-latest","target":"aarch64-pc-windows-msvc","args":"--target aarch64-pc-windows-msvc"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "macos-aarch64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "macos-x86_64" ]; then
            echo 'matrix=[{"platform":"macos-latest","target":"x86_64-apple-darwin","args":"--target x86_64-apple-darwin"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "ubuntu-22.04" ]; then
            echo 'matrix=[{"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","args":"","container":"ghcr.io/uniclipboard/build-bookworm:latest"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "ubuntu-22.04-arm" ]; then
            echo 'matrix=[{"platform":"ubuntu-22.04-arm","target":"aarch64-unknown-linux-gnu","args":"","container":"ghcr.io/uniclipboard/build-bookworm:latest"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "windows-latest" ]; then
            echo 'matrix=[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""},{"platform":"windows-latest","target":"aarch64-pc-windows-msvc","args":"--target aarch64-pc-windows-msvc"}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "windows-x86_64" ]; then
            echo 'matrix=[{"platform":"windows-latest","target":"x86_64-pc-windows-msvc","args":""}]' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" == "windows-arm64" ]; then
            echo 'matrix=[{"platform":"windows-latest","target":"aarch64-pc-windows-msvc","args":"--target aarch64-pc-windows-msvc"}]' >> "$GITHUB_OUTPUT"
          else
            echo "Error: Unknown platform '$PLATFORM'. Valid options: all, macos-aarch64, macos-x86_64, ubuntu-22.04, ubuntu-22.04-arm, windows-latest, windows-x86_64, windows-arm64"
            exit 1
          fi

  build-tauri:
    name: Build ${{ matrix.target }}
    needs: setup-matrix
    runs-on: ${{ matrix.platform }}
    # matrix.container 仅 Linux 条目设置,其他 platform 该字段缺失 → null →
    # GitHub Actions 跳过容器,直接在 host runner 上执行。
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      # Linux 容器走预构建镜像 (.github/docker/build-bookworm.Dockerfile),
      # apt-get 已经在镜像里跑过,这里直接 checkout。镜像由 build-base-image.yml
      # 维护:Dockerfile 变更即重推 :latest,multi-arch (amd64/arm64) manifest。

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target == 'aarch64-pc-windows-msvc' && 'aarch64-pc-windows-msvc' || '' }}

      - name: Prepend cargo bin to PATH
        # macos-15-arm64 runner image 20260511+ 预装了 Homebrew rustup
        # formula,把 rustup-init multicall 软链到 /opt/homebrew/bin/cargo,
        # 导致 `cargo metadata` 命中错误 binary 并吐 rustup-init 用法。
        # dtolnay/rust-toolchain 检测到 rustup 已存在就跳过了 PATH 写入,
        # 这里强制把 rustup 真 proxy 所在目录前置,覆盖 brew 那条。
        shell: bash
        run: echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - name: ensure darwin targets installed on pinned toolchain
        # src-tauri/rust-toolchain.toml 把 cargo 锁到一个具体 channel
        # (例如 1.95.0),而 dtolnay/rust-toolchain@stable 装的是 stable —
        # 这是两个独立的 toolchain。在 src-tauri/ 下跑 cargo 时,target 必须
        # 已经装到 pinned channel,否则报 `Target ... is not installed`
        # (25960898069 / 25961183688 的真因,见 dtolnay/rust-toolchain#75)。
        # 这里先在 src-tauri/ 触发 rustup auto-install pinned toolchain,
        # 再读出 channel 名,显式 `rustup target add --toolchain <channel>`。
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          TC=$(cd src-tauri && rustup show active-toolchain | awk '{print $1}')
          echo "pinned toolchain: $TC"
          rustup target add --toolchain "$TC" aarch64-apple-darwin x86_64-apple-darwin

      - name: ensure windows arm64 target installed on pinned toolchain
        # Same pinned-vs-stable split as the darwin step above: the arm64
        # Windows portable / NSIS build cross-compiles from the x64
        # windows-latest runner, so the pinned toolchain must have the
        # aarch64-pc-windows-msvc target (MSVC ARM64 cross tools ship with the
        # runner's Visual Studio install).
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          TC=$(cd src-tauri && rustup show active-toolchain | awk '{print $1}')
          echo "pinned toolchain: $TC"
          rustup target add --toolchain "$TC" aarch64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: ${{ matrix.target }}
          # 只在 main 写缓存,其他分支(含 tag 触发的 release)只读。
          # Windows Post Cache Rust 上传单次 ~2m43s (25682907543),tag run
          # 通常基于刚合入 main 的代码,命中已存的 main cache 即可,不必再
          # 写一份等价的进 GHA cache (10GB 上限)。
          save-if: ${{ inputs.save_cache || github.ref == 'refs/heads/main' }}

      - name: Restore Bun dependencies
        id: bun-cache
        # Windows NTFS 上压缩 ~/.bun/install/cache 的小文件极慢:
        # 25682907543 run 实测 Post Cache 步骤 7m37s,而 bun install 本身只
        # 1m12s — 缓存反成负优化。Linux/macOS post-cache ~20-30s,保留。
        if: runner.os != 'Windows'
        uses: actions/cache/restore@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install frontend dependencies
        run: bun install

      - name: Save Bun dependencies
        # 只有 main 或显式 save_cache 的 warmup 写 Bun cache。tag release
        # 默认只读取,避免在 10GB GHA cache 配额里挤掉主线预热结果。
        if: runner.os != 'Windows' && (inputs.save_cache || github.ref == 'refs/heads/main') && steps.bun-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: resolve app version
        id: app-version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: resolve APP_ENV from channel
        # Sentry/OTLP environment 标签来源:
        #   stable  → "production" (Sentry 默认值,符合大多数 dashboard 习惯)
        #   alpha/beta/rc → 同名,作为独立 environment
        # 该值同时注入给 Rust 后端 (APP_ENV, option_env! 编译期读取) 和前端
        # (VITE_APP_ENV, Vite 在 build 时内联),保证前后端 environment 一致。
        id: resolve-env
        shell: bash
        run: |
          CHANNEL="${{ inputs.channel || 'stable' }}"
          case "$CHANNEL" in
            stable) APP_ENV="production" ;;
            alpha|beta|rc) APP_ENV="$CHANNEL" ;;
            *)
              echo "::warning::未知 channel '$CHANNEL',回退为 production"
              APP_ENV="production"
              ;;
          esac
          echo "app_env=$APP_ENV" >> "$GITHUB_OUTPUT"
          echo "Resolved APP_ENV=$APP_ENV (from channel=$CHANNEL)"

      - name: prepare uniclipd sidecar
        # ADR-008 D13: the standalone `uniclipd` daemon ships *inside* the GUI
        # installer as a Tauri sidecar (externalBin), so the GUI can spawn it as
        # a sibling of its own executable (uc-daemon-local spawn.rs). `tauri
        # build` verifies `src-tauri/binaries/uniclipd-<triple>` exists, so this
        # must run first. We forward the same `${{ matrix.args }}` (`--target
        # <triple>` or empty) the GUI build uses, so the staged sidecar name is
        # exactly what tauri-cli looks up. The daemon shares the GUI's
        # dependency graph, so any target the GUI cross-builds here, it builds.
        shell: bash
        run: node scripts/prepare-daemon-sidecar.mjs ${{ matrix.args }}

      - name: build Tauri app (macOS signed)
        if: matrix.platform == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_APP_VERSION: ${{ steps.app-version.outputs.version }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: ${{ steps.resolve-env.outputs.app_env }}
          # Backend Sentry DSN — independent Rust project DSN, baked into the
          # binary at compile time via option_env! in uc-bootstrap/src/tracing.rs.
          # MUST be a separate Sentry project from VITE_SENTRY_DSN (front-end);
          # see "阶段 2" decision in the dependency-prune branch discussion.
          # Empty secret = backend Sentry disabled.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          APP_ENV: ${{ steps.resolve-env.outputs.app_env }}
          # Frontend sourcemap upload via @sentry/vite-plugin during vite build.
          # VITE_SENTRY_PROJECT is the front-end Sentry project slug — MUST be
          # different from SENTRY_PROJECT (back-end). Plugin no-ops when token
          # or project is missing.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          VITE_SENTRY_PROJECT: ${{ secrets.VITE_SENTRY_PROJECT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: bun run tauri
          args: ${{ matrix.args }}

      - name: build Tauri app (non-macOS)
        if: matrix.platform != 'macos-latest'
        shell: bash
        env:
          # Linux AppImage 打包用的 linuxdeploy / linuxdeploy-plugin-appimage
          # 本身是 AppImage,运行时默认靠 FUSE 把自己挂载起来。GitHub Actions
          # 的 container job 跑在非特权容器里,没有 /dev/fuse,linuxdeploy 起
          # 不来,只吐一句笼统的 `failed to run linuxdeploy`。设这个变量让
          # AppImage runtime 改成自解压到临时目录再执行,绕开 FUSE。Windows
          # 构建忽略此变量,无副作用。
          APPIMAGE_EXTRACT_AND_RUN: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_APP_VERSION: ${{ steps.app-version.outputs.version }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_ENV: ${{ steps.resolve-env.outputs.app_env }}
          # Backend Sentry DSN — independent Rust project DSN.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          APP_ENV: ${{ steps.resolve-env.outputs.app_env }}
          # Frontend sourcemap upload via @sentry/vite-plugin during vite build.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          VITE_SENTRY_PROJECT: ${{ secrets.VITE_SENTRY_PROJECT }}
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            bun run tauri build ${{ matrix.args }} --bundles nsis
          else
            bun run tauri build ${{ matrix.args }}
          fi

      - name: package Windows portable zip
        # Portable ("green") build: the standalone exe + the `uniclipd` daemon +
        # a `portable.dat` marker that flips both binaries into portable mode at
        # runtime (data stored next to the exe, no install, no system traces).
        # The NSIS installer does NOT ship the marker, so the same compiled exe
        # serves both forms. Written under bundle/ so the existing artifact
        # upload glob picks it up.
        #
        # The daemon MUST ship in the zip: the GUI is a pure external-daemon
        # client (ADR-008 P3-3) and resolves `uniclipd.exe` as a sibling of its
        # own exe — the NSIS bundle gets it via tauri's externalBin, but this
        # hand-rolled zip has to copy it explicitly (v0.14.0 shipped without it
        # and the portable build could not start).
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.app-version.outputs.version }}"
          case "${{ matrix.target }}" in
            aarch64-pc-windows-msvc) ARCH="arm64" ;;
            *) ARCH="x64" ;;
          esac

          # x64 builds with the host default target (args=""), landing in
          # target/release; arm64 cross-builds with --target into target/<triple>.
          if [ -n "${{ matrix.args }}" ]; then
            RELEASE_DIR="src-tauri/target/${{ matrix.target }}/release"
          else
            RELEASE_DIR="src-tauri/target/release"
          fi

          # Tauri may rename the cargo binary (uniclipboard.exe) to the
          # productName (UniClipboard.exe); accept either, ship as UniClipboard.exe.
          EXE=""
          for cand in "UniClipboard.exe" "uniclipboard.exe"; do
            if [ -f "$RELEASE_DIR/$cand" ]; then EXE="$RELEASE_DIR/$cand"; break; fi
          done
          if [ -z "$EXE" ]; then
            echo "::error::portable exe not found under $RELEASE_DIR"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi

          # Daemon sidecar: prepare-daemon-sidecar.mjs built it into the same
          # release dir before `tauri build`. Hard-fail if missing — a portable
          # zip without the daemon cannot start at all.
          DAEMON="$RELEASE_DIR/uniclipd.exe"
          if [ ! -f "$DAEMON" ]; then
            echo "::error::uniclipd.exe not found under $RELEASE_DIR — portable zip would be unusable"
            ls -la "$RELEASE_DIR" || true
            exit 1
          fi

          STAGE="portable-stage"
          OUT_DIR="$RELEASE_DIR/bundle/portable"
          rm -rf "$STAGE"
          mkdir -p "$STAGE" "$OUT_DIR"
          cp "$EXE" "$STAGE/UniClipboard.exe"
          cp "$DAEMON" "$STAGE/uniclipd.exe"
          # Marker file: presence next to the exe enables portable mode.
          : > "$STAGE/portable.dat"
          cp packaging/windows/portable/README.txt "$STAGE/README.txt"

          ZIP="$OUT_DIR/UniClipboard_${VERSION}_${ARCH}-portable.zip"
          powershell -Command "Compress-Archive -Path '$STAGE/*' -DestinationPath '$ZIP' -Force"
          echo "Built portable zip:"
          ls -la "$OUT_DIR"

      - name: Upload Sentry debug symbols
        # 把 release 编译出的 .dSYM (macOS) / .pdb (Windows) / DWARF (Linux)
        # 上传给 Sentry,后续 panic 上报时 Sentry 用 build-id 把地址翻译回
        # 函数名 + 文件 + 行号(配合 --include-sources 还会嵌源码片段)。
        # 没配 SENTRY_AUTH_TOKEN / SENTRY_PROJECT 时整个 step 跳过,不阻断构建。
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN/SENTRY_PROJECT not configured — skipping debug-files upload"
            exit 0
          fi
          npm install -g @sentry/cli
          # macOS 用 --target,产物在 target/<triple>/release/;
          # Linux/Windows args 为空,产物在 target/release/。
          if [ -d "src-tauri/target/${{ matrix.target }}/release" ]; then
            TARGET_DIR="src-tauri/target/${{ matrix.target }}/release"
          elif [ -d "src-tauri/target/release" ]; then
            TARGET_DIR="src-tauri/target/release"
          else
            echo "::warning::No release directory found — skipping"
            exit 0
          fi
          echo "Uploading debug files from $TARGET_DIR"
          sentry-cli debug-files upload --include-sources "$TARGET_DIR"

      - name: upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: uniclipboard-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
