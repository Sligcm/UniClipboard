name: 'Cache Warmup'

on:
  schedule:
    # Run every Monday at 00:00 UTC to keep Rust/Bun caches warm.
    # GitHub Actions caches expire after 7 days of inactivity.
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  warmup-release-app:
    name: Warm release app caches
    uses: ./.github/workflows/build.yml
    with:
      platform: 'all'
      save_cache: true
    secrets: inherit

  warmup-windows-cli:
    # 先预热 Windows CLI:这是最近 release 没命中的关键路径。
    # CLI 全平台 cache 会明显挤占 10GB 配额,如后续确实需要再按平台扩展。
    name: Warm Windows CLI cache
    uses: ./.github/workflows/build-cli.yml
    with:
      platform: 'windows-latest'
      save_cache: true
    secrets: inherit

  warmup-pr-check-rust:
    name: Warm PR check Rust cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: pr-check
          save-if: true

      - name: Check Rust workspace
        run: cargo check --workspace --locked

  warmup-docs-bun:
    # docs-check.yml PR 阶段只 restore Linux-docs-bun-*,这里负责在 main 上写。
    name: Warm docs Bun cache
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            docs-site/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-docs-bun-${{ hashFiles('docs-site/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-docs-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

  warmup-coverage-rust:
    name: Warm coverage Rust cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: coverage
          save-if: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Generate coverage report
        run: |
          xvfb-run -a cargo llvm-cov --lcov --output-path lcov.info --workspace
