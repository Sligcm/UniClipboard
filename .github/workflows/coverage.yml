name: Coverage

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'apps/**'
      - 'src-tauri/**'
      - 'tests/e2e/**'
      - 'vendor/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'clippy.toml'
      - '.github/workflows/coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: coverage
          # PR 只读 default branch cache,写入由 cache-warmup 统一负责。
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - name: Generate coverage report
        env:
          # ADR-008 D13 added `externalBin: ["binaries/uniclipd"]` to
          # tauri.conf.json, so `tauri_build::build()` requires and copies
          # `src-tauri/binaries/uniclipd-<triple>` at compile time. Real bundles
          # stage it via prepare-daemon-sidecar.mjs (build.yml / alpha-build.yml),
          # but this job only measures coverage and never ships the sidecar — and
          # the copy would clobber the workspace's own instrumented `uniclipd` bin
          # in the target dir, breaking `cargo llvm-cov`'s object scan. Override
          # the config to drop the sidecar for this build (tauri-build merges
          # TAURI_CONFIG as a JSON Merge Patch; an empty array replaces the list),
          # so the build script neither requires nor copies it.
          TAURI_CONFIG: '{"bundle":{"externalBin":[]}}'
        run: |
          xvfb-run -a cargo llvm-cov --lcov --output-path lcov.info --workspace

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lcov.info
          flags: rust-backend
          name: rust-coverage
          fail_ci_if_error: false
