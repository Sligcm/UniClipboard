name: 'Format Check'
run-name: 'Format check for ${{ github.head_ref || github.ref_name }}'

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'eslint.config.js'
      - 'index.html'
      - 'quick-panel.html'
      - 'public/**'
      - '.prettierrc*'
      - 'prettier.config.*'
      - '.github/workflows/format.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Format Check
    # Guard against accidental non-PR triggers (e.g. workflow validation runs on push).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # Use a PAT or the default token; for same-repo PRs GITHUB_TOKEN can push.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Rust stable (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all

      - name: Run prettier
        run: bun run format

      - name: Check for format changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "has_workflow_changes=false" >> "$GITHUB_OUTPUT"
            echo "No format issues found."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Format issues detected:"
            git diff --stat

            if git diff --name-only -- .github/workflows | grep -q .; then
              echo "has_workflow_changes=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Formatted changes include .github/workflows files; the default GitHub Actions token cannot auto-push workflow file updates."
            else
              echo "has_workflow_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ---------- Same-repo PR: push fix directly to PR head branch ----------
      - name: Auto-format and push to PR branch
        id: push-fix
        if: |
          steps.diff.outputs.has_changes == 'true' &&
          steps.diff.outputs.has_workflow_changes != 'true' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "style: auto-format code for PR #$PR_NUMBER"

          # GITHUB_TOKEN 推送的 commit 默认不会再触发任何 workflow(防递归),
          # 所以本次 format check 仍以失败收尾,但 PR head 上已经带上了
          # 格式化 commit。作者 git pull 之后再 push 一次(或在 GH UI 点
          # re-run failed)checks 就会变绿。
          if git push origin "HEAD:refs/heads/$PR_HEAD_REF"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::已自动提交格式化 commit 到 $PR_HEAD_REF。请 git pull 同步本地分支,然后重新 push 一次 / 或在 PR 页点 Re-run failed checks 让 CI 变绿。"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Auto-push 失败(可能远端在此期间有新 commit)。请本地运行 \`cd src-tauri && cargo fmt --all && cd .. && bun run format\` 并提交。"
          fi

      # ---------- Fork PR / workflow file changes: print diff for author ----------
      - name: Show diff when auto-push is unavailable
        if: |
          steps.diff.outputs.has_changes == 'true' &&
          (
            github.event.pull_request.head.repo.full_name != github.repository ||
            steps.diff.outputs.has_workflow_changes == 'true'
          )
        run: |
          if [ "${{ steps.diff.outputs.has_workflow_changes }}" = "true" ]; then
            echo "::warning::Format issues include .github/workflows files. GitHub Actions 默认 token 无权直推 workflow 文件,需要作者本地修复。"
          else
            echo "::warning::Format issues found. Fork PR 无法自动直推,请作者本地修复。"
          fi
          echo "Please run the following commands locally and push the changes:"
          echo ""
          echo "  cd src-tauri && cargo fmt --all && cd .."
          echo "  bun run format"
          git diff

      # ---------- Always fail the check if there were format issues ----------
      - name: Fail if format changes needed
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          if [ "${{ steps.push-fix.outputs.pushed }}" = "true" ]; then
            echo "::error::Format 修复已自动推送到 PR 分支。请 pull 后 re-run checks 让本检查变绿。"
          else
            echo "::error::Format issues found. See above for details."
          fi
          exit 1
