name: Frontend Coverage
run-name: 'Frontend coverage for ${{ github.head_ref }}'

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - '.github/workflows/frontend-coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun dependencies
        # PR 只读取 default branch 上由 cache-warmup 写入的 Bun cache。
        # actions/cache 会在 miss 时自动保存,这里用 restore 子 action 避免
        # 每个 refs/pull/*/merge 写出重复 cache 并挤掉 release 预热缓存。
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Generate frontend coverage report
        run: bun run test:coverage:frontend

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
