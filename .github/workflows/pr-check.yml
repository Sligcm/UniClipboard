name: 'PR Check'
run-name: 'PR check for ${{ github.head_ref }}'

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'eslint.config.js'
      - 'index.html'
      - 'quick-panel.html'
      - 'public/**'
      - '.github/workflows/pr-check.yml'

# 拆 frontend / frontend-tests / rust 三个 job 并行：
# - frontend: bun install + tsc + vite build (类型检查 + 产物构建)
# - frontend-tests: bun install + vitest run (前端单元测试)
# - rust: cargo check --workspace --locked (不再带 --all-targets --all-features，
#   PR 阶段不为 test/bench/全 feature 编译。test 在 coverage.yml 跑)
# 完整的 tauri build / 签名 / 公证 仍只在 release 工作流跑。
jobs:
  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun dependencies
        # PR 只读取 default branch 上由 cache-warmup 写入的 Bun cache。
        # actions/cache 会在 miss 时自动保存,这里用 restore 子 action 避免
        # 每个 refs/pull/*/merge 写出重复 cache 并挤掉 release 预热缓存。
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Type check & build frontend
        run: bun run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run test -- --run

  rust:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: pr-check
          # PR 只读 default branch cache,写入由 cache-warmup 统一负责。
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check Rust workspace
        working-directory: src-tauri
        run: cargo check --workspace --locked
