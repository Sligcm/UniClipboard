name: 'PR Check'
run-name: 'PR check for ${{ github.head_ref }}'

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'eslint.config.js'
      - 'index.html'
      - 'quick-panel.html'
      - 'public/**'
      - '.github/docker/build-bookworm.Dockerfile'
      - '.github/workflows/pr-check.yml'

permissions:
  contents: read
  packages: read
  pull-requests: read

# 拆 frontend / frontend-tests / rust 三个 job：
# - changes: 检测 PR 是否改到 Rust 相关路径，供 rust job 判断是否需要运行
# - frontend: bun install + tsc + vite build (类型检查 + 产物构建)
# - frontend-tests: bun install + vitest run (前端单元测试)
# - rust: cargo check --workspace --locked (不再带 --all-targets --all-features，
#   PR 阶段不为 test/bench/全 feature 编译。test 在 coverage.yml 跑)
# 完整的 tauri build / 签名 / 公证 仍只在 release 工作流跑。
jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest

    outputs:
      rust: ${{ steps.filter.outputs.rust }}

    steps:
      - name: Detect Rust changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - '.github/docker/build-bookworm.Dockerfile'
              - '.github/workflows/pr-check.yml'

  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun dependencies
        # PR 只读取 default branch 上由 cache-warmup 写入的 Bun cache。
        # actions/cache 会在 miss 时自动保存,这里用 restore 子 action 避免
        # 每个 refs/pull/*/merge 写出重复 cache 并挤掉 release 预热缓存。
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Type check & build frontend
        run: bun run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun dependencies
        # PR 只读取 default branch 上由 cache-warmup 写入的 Bun cache。
        # actions/cache 会在 miss 时自动保存,这里用 restore 子 action 避免
        # 每个 refs/pull/*/merge 写出重复 cache 并挤掉 release 预热缓存。
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        run: bun run test -- --run

  rust:
    name: Rust Check
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    # 复用 build-base-image.yml 维护的 bookworm 镜像,避免 PR job 每次访问
    # apt 源安装 webkit/gtk 依赖。镜像已包含 cargo check 所需系统包。
    container:
      image: ghcr.io/uniclipboard/build-bookworm:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: pr-check
          # PR 只读 default branch cache,写入由 cache-warmup 统一负责。
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check Rust workspace
        working-directory: src-tauri
        run: cargo check --workspace --locked

      # IPC schema drift check (issue #698) —— `cargo test --test specta_export`
      # 用同一个 `tauri_specta::Builder` 构造命令清单，把 TypeScript binding
      # 写到 `src/lib/ipc-bindings.generated.ts`。如果 PR 改了任何
      # `#[tauri::command]` / DTO / error enum 的形状但没把这个文件一起提交，
      # `cmp` 会以非零退出，CI 拒绝合并。开发者本地修复:
      # `cargo test -p uc-tauri --test specta_export` 重新生成后 `git add`。
      #
      # 不用 `git diff` 是因为 actions/checkout@v4 只在 host runner 配置
      # `safe.directory`,容器内 git 看不到,会把 workspace 当成非仓库,导致
      # `git diff <file>` 误判为 `--no-index` 模式并打印 usage 报错。
      - name: Snapshot committed IPC bindings
        run: cp src/lib/ipc-bindings.generated.ts /tmp/ipc-bindings.committed.ts
      - name: Generate IPC bindings
        working-directory: src-tauri
        run: cargo test -p uc-tauri --test specta_export --locked
      - name: Verify IPC bindings are up to date
        run: |
          if ! cmp -s /tmp/ipc-bindings.committed.ts src/lib/ipc-bindings.generated.ts; then
            echo "::error::IPC schema drift detected. Run 'cargo test -p uc-tauri --test specta_export' locally and commit the regenerated src/lib/ipc-bindings.generated.ts."
            diff -u /tmp/ipc-bindings.committed.ts src/lib/ipc-bindings.generated.ts || true
            exit 1
          fi
