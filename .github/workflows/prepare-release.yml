name: Prepare Release
run-name: prepare-release-v${{ inputs.version || inputs.bump }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact semver version (e.g. 0.3.0, no "v" prefix). Leave empty to use bump type.'
        required: false
        type: string
        default: ''
      bump:
        description: 'Version bump type (used only if version is empty)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      channel:
        description: 'Release channel'
        required: false
        type: choice
        options:
          - stable
          - alpha
          - beta
          - rc
        default: stable
      base_branch:
        description: 'Branch to base the release off (default: main). Use release/vX.Y.Z when iterating prereleases on a release branch whose commits have not yet been merged back to main.'
        required: false
        type: string
        default: 'main'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      BASE_BRANCH: ${{ inputs.base_branch || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch || 'main' }}
          token: ${{ secrets.REPO_BOT_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using exact version: $VERSION"
          else
            # Dry-run bump to determine the version
            OUTPUT=$(node scripts/bump-version.js --type ${{ inputs.bump }} --channel ${{ inputs.channel }} --dry-run 2>&1)
            VERSION=$(echo "$OUTPUT" | grep "New version:" | awk '{print $NF}')
            if [ -z "$VERSION" ]; then
              echo "Error: Could not determine version from bump-version.js dry-run"
              echo "$OUTPUT"
              exit 1
            fi
            echo "Determined version from bump: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release branch does not exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --heads origin "release/v${VERSION}" | grep -q "release/v${VERSION}"; then
            echo "Error: Branch release/v${VERSION} already exists on remote"
            exit 1
          fi

      - name: Create release branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git checkout -b "release/v${VERSION}"

      - name: Bump version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node scripts/bump-version.js --to "${VERSION}"

      - name: Determine changelog context
        id: changelog-context
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TEMP_OUTPUT=$(mktemp)
          node scripts/previous-published-release.js \
            --repo "${{ github.repository }}" \
            --current-version "${VERSION}" \
            --github-output "${TEMP_OUTPUT}"

          PREV_TAG=$(grep '^previous_tag=' "${TEMP_OUTPUT}" | cut -d= -f2-)
          PREV_VERSION=$(grep '^previous_version=' "${TEMP_OUTPUT}" | cut -d= -f2-)

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            PREV_VERSION="initial commit"
          fi

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "range_expression=${PREV_TAG}..HEAD" >> "$GITHUB_OUTPUT"

          echo "Previous published version: $PREV_VERSION"
          echo "Allowed changelog range: ${PREV_TAG}..HEAD"
          rm -f "${TEMP_OUTPUT}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Refresh Cargo.lock for workspace members
        run: cargo update -p uc-cli

      - name: Generate changelog skeleton
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DATE="$(date -u +%F)"
          node scripts/changelog-draft.js init \
            --version "${VERSION}" \
            --date "${RELEASE_DATE}"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Format code
        run: |
          cargo fmt --all
          bun run format

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml Cargo.toml Cargo.lock docs/changelog/
          git commit -m "chore: bump version to ${VERSION}"

      - name: Render Codex changelog prompt
        if: env.CODEX_API_KEY != ''
        id: render-codex-changelog-prompt
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          PREVIOUS_TAG: ${{ steps.changelog-context.outputs.previous_tag }}
          PREVIOUS_VERSION: ${{ steps.changelog-context.outputs.previous_version }}
          RANGE_EXPRESSION: ${{ steps.changelog-context.outputs.range_expression }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const templatePath = '.github/prompts/release-changelog.codex.md';
          let prompt = fs.readFileSync(templatePath, 'utf8');
          const replacements = {
            '{{VERSION}}': process.env.VERSION,
            '{{CURRENT_TAG}}': `v${process.env.VERSION}`,
            '{{PREVIOUS_TAG}}': process.env.PREVIOUS_TAG,
            '{{PREVIOUS_VERSION}}': process.env.PREVIOUS_VERSION,
            '{{RANGE_EXPRESSION}}': process.env.RANGE_EXPRESSION,
            '{{CHANNEL}}': process.env.CHANNEL,
            '{{IS_PRERELEASE}}': process.env.CHANNEL === 'stable' ? 'false' : 'true',
          };

          for (const [token, value] of Object.entries(replacements)) {
            prompt = prompt.replaceAll(token, value);
          }

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `prompt<<__CODEX_PROMPT__\n${prompt}\n__CODEX_PROMPT__\n`
          );
          EOF

      - name: Codex polish changelog
        if: env.CODEX_API_KEY != ''
        uses: openai/codex-action@v1
        with:
          responses-api-endpoint: ${{ secrets.CODEX_API_ENDPOINT || 'https://api.openai.com/v1/responses' }}
          openai-api-key: ${{ env.CODEX_API_KEY }}
          prompt: ${{ steps.render-codex-changelog-prompt.outputs.prompt }}

      - name: Validate changelog output
        run: |
          if [ -z "${CODEX_API_KEY}" ]; then
            echo "CODEX_API_KEY is required to generate finalized changelog files." >&2
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          node scripts/changelog-draft.js validate --version "${VERSION}"

      - name: Commit codex changes
        if: env.CODEX_API_KEY != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add docs/changelog/
          git diff --cached --quiet || git commit -m "docs: polish changelog for v${VERSION}"

      - name: Push release branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git push origin "release/v${VERSION}"

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_URL=$(gh pr create \
            --title "release: v${VERSION}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          This PR prepares the release of v${VERSION} (base: \`${BASE_BRANCH}\`).

          ### Changes
          - Version bumped to ${VERSION} in package.json, tauri.conf.json, Cargo.toml, Cargo.lock
          - Changelog generated at docs/changelog/${VERSION}.md

          ### What happens when this PR is merged
          1. The **tag-on-merge** workflow will automatically create an annotated tag \`v${VERSION}\`
          2. The tag push will trigger the **Release** workflow to build and publish artifacts
          3. The release branch \`release/v${VERSION}\` will be automatically deleted

          > **Do not manually create a tag.** Merging this PR handles everything.
          EOF
          )" \
            --base "${BASE_BRANCH}" \
            --head "release/v${VERSION}")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release Preparation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ inputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** release/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** ${PR_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the PR and changelog" >> $GITHUB_STEP_SUMMARY
          echo "2. Merge the PR to trigger automatic tag creation and release" >> $GITHUB_STEP_SUMMARY
