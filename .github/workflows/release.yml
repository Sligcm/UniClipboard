name: 'Release'
run-name: >-
  ${{ github.event_name == 'push'
    && format('release-{0}', github.ref_name)
    || format('release-{0}-{1}', inputs.channel, github.run_number) }}
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      branch:
        description: '发布分支'
        required: true
        type: string
        default: 'main'
      platform:
        description: '构建平台'
        required: true
        type: choice
        options:
          - 'all'
          - 'macos-aarch64'
          - 'macos-x86_64'
          - 'ubuntu-22.04'
          - 'ubuntu-22.04-arm'
          - 'windows-latest'
          - 'windows-x86_64'
          - 'windows-arm64'
        default: 'all'
      bump:
        description: '版本升级类型'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      channel:
        description: '发布渠道'
        required: true
        type: choice
        options:
          - 'stable'
          - 'alpha'
          - 'beta'
          - 'rc'
        default: 'stable'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set-outputs.outputs.version }}
      previous_tag: ${{ steps.get-previous-tag.outputs.previous_tag }}
      is_prerelease: ${{ steps.set-outputs.outputs.is_prerelease }}
      channel: ${{ steps.set-outputs.outputs.channel }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        id: bump-version
        run: |
          # Run version bump script
          node scripts/bump-version.js --type ${{ inputs.bump }} --channel ${{ inputs.channel }}

          # Get the new version
          VERSION=$(node -p "require('./package.json').version")
          echo "New version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        if: github.event_name == 'workflow_dispatch'

      - name: Refresh Cargo.lock for workspace members
        if: github.event_name == 'workflow_dispatch'
        run: cargo update -p uc-cli

      - name: Set outputs
        id: set-outputs
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from tag (strip 'v' prefix)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ steps.bump-version.outputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine prerelease status and channel
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.set-outputs.outputs.version }}"
          git push origin ${{ inputs.branch }}

      - name: Check if tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.set-outputs.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            echo "Error: Tag v$VERSION already exists"
            echo "This should not happen after version bump. Please check the workflow."
            exit 1
          fi

      - name: Get previous tag
        id: get-previous-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMP_OUTPUT=$(mktemp)
          node scripts/previous-published-release.js \
            --repo "${{ github.repository }}" \
            --current-version "${{ steps.set-outputs.outputs.version }}" \
            --github-output "${TEMP_OUTPUT}"

          PREV_TAG=$(grep '^previous_tag=' "${TEMP_OUTPUT}" | cut -d= -f2-)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using initial commit"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous reference: $PREV_TAG"
          rm -f "${TEMP_OUTPUT}"

  build:
    needs: validate
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ inputs.platform || 'all' }}
      branch: ${{ inputs.branch || '' }}
      channel: ${{ needs.validate.outputs.channel }}
    secrets: inherit

  build-cli:
    needs: validate
    uses: ./.github/workflows/build-cli.yml
    with:
      platform: ${{ inputs.platform || 'all' }}
      branch: ${{ inputs.branch || '' }}
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: [validate, build, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        # archive-release-notes.js imports `semver`; without node_modules
        # the Archive step fails with ERR_MODULE_NOT_FOUND.
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Prepare release assets
        id: prepare-assets
        run: |
          mkdir -p release-assets

          # Collect release bundles. For macOS updater archives, keep target in filename
          # so aarch64/x86_64 artifacts won't overwrite each other during flattening.
          while IFS= read -r src; do
            filename="$(basename "$src")"
            target=""

            case "$src" in
              *aarch64-apple-darwin*) target="aarch64-apple-darwin" ;;
              *x86_64-apple-darwin*) target="x86_64-apple-darwin" ;;
            esac

            dest="$filename"
            if [ -n "$target" ] && [ "$filename" = "UniClipboard.app.tar.gz" ]; then
              dest="UniClipboard_${target}.app.tar.gz"
            elif [ -n "$target" ] && [ "$filename" = "UniClipboard.app.tar.gz.sig" ]; then
              dest="UniClipboard_${target}.app.tar.gz.sig"
            fi

            if [ -e "release-assets/$dest" ]; then
              if [ -n "$target" ]; then
                dest="${target}__${dest}"
              else
                safe_suffix="$(echo "$src" | tr '/\\' '_' | tr -cd '[:alnum:]_.-' | cut -c1-80)"
                base="$dest"
                ext=""
                if [[ "$dest" == *.* ]]; then
                  ext=".${dest##*.}"
                  base="${dest%.*}"
                fi
                dest="${base}__${safe_suffix}${ext}"
              fi
            fi

            cp "$src" "release-assets/$dest"
          done < <(find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*-portable.zip" -o \
            -name "*.sig" -o \
            -name "*.json" \
          \) | sort)

          # Collect CLI binary archives (uniquely named, no collision handling needed)
          while IFS= read -r src; do
            filename="$(basename "$src")"
            cp "$src" "release-assets/$filename"
          done < <(find artifacts -type f \( \
            -name "uniclipboard-cli-*.tar.gz" -o \
            -name "uniclipboard-cli-*.zip" \
          \) | sort)

          # Verify CLI archives are present
          echo "CLI archives in release-assets/:"
          ls -la release-assets/uniclipboard-cli-* 2>/dev/null || echo "WARNING: No CLI archives found"

          echo "Release assets:"
          ls -lh release-assets

      - name: Sign release assets (SHA256SUMS + minisign)
        env:
          MINISIGN_RELEASE_PRIVATE_KEY: ${{ secrets.MINISIGN_RELEASE_PRIVATE_KEY }}
          MINISIGN_RELEASE_PASSWORD: ${{ secrets.MINISIGN_RELEASE_PASSWORD }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cd release-assets

          # Checksum every release artifact. Exclude the checksum files themselves
          # (the .minisig won't exist yet, but guard against re-runs anyway).
          : > SHA256SUMS.txt
          while IFS= read -r f; do
            sha256sum "$f" >> SHA256SUMS.txt
          done < <(find . -maxdepth 1 -type f \
            ! -name 'SHA256SUMS.txt' ! -name 'SHA256SUMS.txt.minisig' \
            -printf '%P\n' | sort)

          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

          # Sign the checksum file with the dedicated release-artifact minisign key.
          # Skipped (with a warning) when the secret isn't configured yet, so a
          # release never hard-fails during rollout — SHA256SUMS.txt is still shipped.
          if [ -z "${MINISIGN_RELEASE_PRIVATE_KEY}" ]; then
            echo "::warning::MINISIGN_RELEASE_PRIVATE_KEY not set — publishing SHA256SUMS.txt without a signature."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y minisign

          umask 077
          printf '%s\n' "${MINISIGN_RELEASE_PRIVATE_KEY}" > minisign-release.key
          # minisign reads the key password from stdin when stdin is not a TTY; a
          # passwordless key simply ignores the piped line.
          printf '%s\n' "${MINISIGN_RELEASE_PASSWORD:-}" | \
            minisign -S -s minisign-release.key -m SHA256SUMS.txt \
              -t "UniClipboard v${VERSION} release artifacts (SHA256SUMS)"
          rm -f minisign-release.key

          echo "=== SHA256SUMS.txt.minisig ==="
          cat SHA256SUMS.txt.minisig

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.validate.outputs.version }}" -m "Release v${{ needs.validate.outputs.version }}"
          git push origin "v${{ needs.validate.outputs.version }}"

      - name: Fetch GitHub generated notes
        id: gh-generated-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PREV_TAG="${{ needs.validate.outputs.previous_tag }}"

          # 仅当 previous_tag 是真实 tag (以 v 开头) 时才传给 API；
          # 首发场景下 previous_tag 会是 commit hash，让 GitHub 自行回退。
          ARGS=(-X POST "/repos/${{ github.repository }}/releases/generate-notes"
                -f "tag_name=v${VERSION}")
          if [[ "$PREV_TAG" == v* ]]; then
            ARGS+=(-f "previous_tag_name=${PREV_TAG}")
          fi

          if ! gh api "${ARGS[@]}" --jq '.body' > generated-notes.md; then
            echo "Warning: gh api generate-notes failed; New Contributors section will be omitted"
            : > generated-notes.md
          fi

          echo "Preview of GitHub-generated notes:"
          head -80 generated-notes.md || true

      - name: Generate release notes
        id: release-notes
        run: |
          node scripts/generate-release-notes.js \
            --version "${{ needs.validate.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --previous-tag "${{ needs.validate.outputs.previous_tag }}" \
            --channel "${{ needs.validate.outputs.channel }}" \
            --is-prerelease "${{ needs.validate.outputs.is_prerelease }}" \
            --artifacts-dir "release-assets" \
            --template ".github/release-notes/release.md.tmpl" \
            --generated-notes-file "generated-notes.md" \
            --output "release-notes.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          draft: ${{ needs.validate.outputs.channel != 'alpha' }}
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          VERSION="${{ needs.validate.outputs.version }}"
          for file in release-assets/*; do
            filename=$(basename "$file")
            echo "Uploading ${filename} to R2..."
            wrangler r2 object put \
              "uniclipboard-releases/artifacts/v${VERSION}/${filename}" \
              --file "$file" \
              --remote
          done

      - name: Assemble and upload R2 manifest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          CHANNEL="${{ needs.validate.outputs.channel }}"
          WORKER_URL="${{ vars.UPDATE_SERVER_URL }}"

          node scripts/assemble-update-manifest.js \
            --version "$VERSION" \
            --artifacts-dir release-assets \
            --output "updates-r2/${CHANNEL}.json" \
            --base-url "${WORKER_URL}/artifacts/v${VERSION}" \
            --notes-file "docs/changelog/${VERSION}.md" \
            --zh-notes-file "docs/changelog/${VERSION}.zh.md"

          echo "R2 manifest assembled for channel: ${CHANNEL}"
          cat "updates-r2/${CHANNEL}.json"

          wrangler r2 object put \
            "uniclipboard-releases/manifests/${CHANNEL}.json" \
            --file "updates-r2/${CHANNEL}.json" \
            --content-type "application/json" \
            --remote

      - name: Archive release notes and update channel index
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          CHANNEL="${{ needs.validate.outputs.channel }}"

          node scripts/archive-release-notes.js \
            --version "$VERSION" \
            --channel "$CHANNEL" \
            --notes-file "docs/changelog/${VERSION}.md" \
            --zh-notes-file "docs/changelog/${VERSION}.zh.md"

      - name: Assemble update manifest
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          CHANNEL="${{ needs.validate.outputs.channel }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          node scripts/assemble-update-manifest.js \
            --version "$VERSION" \
            --artifacts-dir release-assets \
            --output "updates/${CHANNEL}.json" \
            --base-url "$BASE_URL" \
            --notes-file "docs/changelog/${VERSION}.md" \
            --zh-notes-file "docs/changelog/${VERSION}.zh.md"

          echo "Manifest assembled for channel: ${CHANNEL}"
          cat "updates/${CHANNEL}.json"

      - name: Deploy update manifests to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./updates
          destination_dir: .
          keep_files: true
          commit_message: "deploy: update ${CHANNEL} manifest for v${VERSION}"
        env:
          CHANNEL: ${{ needs.validate.outputs.channel }}
          VERSION: ${{ needs.validate.outputs.version }}

      - name: Summary
        run: |
          echo "## Release Created Successfully! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** ${{ needs.validate.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ inputs.platform || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Prerelease:** ${{ needs.validate.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to [Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.validate.outputs.channel }}" = "alpha" ]; then
            echo "2. Alpha release已自动发布，无需手动 publish" >> $GITHUB_STEP_SUMMARY
          else
            echo "2. Review the generated draft release notes" >> $GITHUB_STEP_SUMMARY
            echo "3. Publish the release when ready" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Update Manifest" >> $GITHUB_STEP_SUMMARY
          echo "Channel manifest deployed to GitHub Pages:" >> $GITHUB_STEP_SUMMARY
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "https://${REPO_OWNER}.github.io/${REPO_NAME}/${{ needs.validate.outputs.channel }}.json" >> $GITHUB_STEP_SUMMARY

  dispatch-snap:
    # snap 构建耗时较长,不能作为 reusable job 挂在 release 里等待。
    # 这里仅异步触发独立的 snap.yml,让主发布流程在常规产物完成后尽快结束。
    #
    # 渠道映射:alpha→edge,beta→beta,rc→candidate,stable→stable。
    # beta / rc / stable 仍由人工发布 GitHub Release 后触发 snap.yml。
    # snap.yml 保留手动入口,触发失败或 Snap Store 临时问题时可单独补跑。
    name: Dispatch snap workflow
    needs: [validate, create-release]
    if: ${{ success() && needs.validate.outputs.channel == 'alpha' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch snap build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          SNAP_CHANNEL: ${{ needs.validate.outputs.channel == 'alpha' && 'edge' || needs.validate.outputs.channel == 'rc' && 'candidate' || needs.validate.outputs.channel }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/snap.yml/dispatches" \
            -f ref="v${VERSION}" \
            -f inputs[channel]="${SNAP_CHANNEL}" \
            -f inputs[release]="true" \
            -f inputs[branch]=""

          echo "Dispatched snap.yml for v${VERSION} (${SNAP_CHANNEL})." >> "$GITHUB_STEP_SUMMARY"

  dispatch-copr-alpha:
    # alpha release 由本 workflow 自动发布,不会稳定触发 copr.yml 的
    # release.published 入口。这里异步触发 COPR,避免漏发,同时不等待 COPR 完成。
    #
    # stable / beta / rc 仍由人工发布 GitHub Release 后触发 copr.yml,
    # 避免 draft 还没确认就进入外部分发渠道。
    name: Dispatch COPR workflow for alpha
    needs: [validate, create-release]
    if: ${{ success() && needs.validate.outputs.channel == 'alpha' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch COPR build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/copr.yml/dispatches" \
            -f ref="v${VERSION}" \
            -f inputs[version]="${VERSION}" \
            -f inputs[project]="uniclipboard-alpha" \
            -f inputs[run_ids]=""

          echo "Dispatched copr.yml for v${VERSION} (uniclipboard-alpha)." >> "$GITHUB_STEP_SUMMARY"

  dispatch-npm-alpha:
    # alpha release 由本 workflow 用 GITHUB_TOKEN 自动发布,不会触发
    # npm-publish.yml 的 release.published 入口,这里显式 dispatch
    # (与 dispatch-snap / dispatch-copr-alpha 同一模式)。
    #
    # 版本后缀映射 npm dist-tag:X.Y.Z-alpha.N → `alpha`,不会动 `latest`。
    # 已发布过的版本会被 npm-publish.yml 跳过,重复 dispatch 幂等。
    # stable / beta / rc 仍由人工发布 GitHub Release 后触发 npm-publish.yml。
    name: Dispatch npm publish for alpha
    needs: [validate, create-release]
    if: ${{ success() && needs.validate.outputs.channel == 'alpha' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch npm publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/actions/workflows/npm-publish.yml/dispatches" \
            -f ref="v${VERSION}" \
            -f inputs[version]="${VERSION}"

          echo "Dispatched npm-publish.yml for v${VERSION} (dist-tag: alpha)." >> "$GITHUB_STEP_SUMMARY"
