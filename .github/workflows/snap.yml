name: 'Snap'
run-name: "snap-${{ inputs.channel || github.event.release.tag_name || 'edge' }}-${{ github.run_number }}"

# Snap 走 strict + gnome extension,base=core22 让产物在 Ubuntu 20.04 / RHEL 9
# / openSUSE Leap 这类 webkit2gtk-4.1 缺位的老 distro 上也能跑(snap 内部
# bundle 了 webkit/glibc/GTK 完整 stack,跟 host 解耦)。这是 .deb 覆盖不了
# 的用户群,详见 snap/snapcraft.yaml 顶部说明。
#
# 推送到 snap store 需要 SNAPCRAFT_STORE_CREDENTIALS secret(`snapcraft
# export-login --snaps=uniclipboard --acls package_upload --expires <date>`
# 生成,详见 README/CONTRIBUTING)。secret 缺失时 publish 步骤跳过,只产
# workflow artifact。
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Snap store channel'
        required: true
        type: choice
        options:
          - edge
          - beta
          - candidate
          - stable
        default: edge
      release:
        description: 'Push to snap store after build (off = artifact only)'
        required: false
        type: boolean
        default: true
      branch:
        description: 'Branch to build'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      channel:
        description: 'Snap store channel'
        required: false
        type: string
        default: edge
      release:
        description: 'Push to snap store after build (false = artifact only)'
        required: false
        type: boolean
        default: true
      branch:
        description: 'Branch / ref to build'
        required: false
        type: string
        default: ''
    secrets:
      SNAPCRAFT_STORE_CREDENTIALS:
        description: 'snapcraft export-login token; missing = artifact-only'
        required: false

jobs:
  build:
    # alpha 由 release.yml 在自动发布完成后显式 dispatch,这里的
    # release.published 入口只承接人工发布的 beta / rc / stable。
    if: ${{ github.event_name != 'release' || !contains(github.event.release.tag_name, '-alpha') }}
    name: Build snap (amd64)
    # snap build 必须在 Ubuntu host 上跑,snapcraft action 自带 LXD;
    # 我们用 22.04 跟 base=core22 对齐,snapcraft action-build 装的工具链
    # 跟 base 一致避免 ABI 错位。
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Resolve snap metadata
        id: snap-meta
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_RELEASE: ${{ inputs.release }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          REF="${INPUT_BRANCH:-}"
          if [ -z "$REF" ]; then
            REF="${RELEASE_TAG:-${GITHUB_REF}}"
          fi

          CHANNEL="${INPUT_CHANNEL:-}"
          if [ -z "$CHANNEL" ]; then
            VERSION="${RELEASE_TAG#v}"
            case "$VERSION" in
              *-alpha*) CHANNEL="edge" ;;
              *-beta*) CHANNEL="beta" ;;
              *-rc*) CHANNEL="candidate" ;;
              *) CHANNEL="stable" ;;
            esac
          fi

          RELEASE="${INPUT_RELEASE:-true}"

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.snap-meta.outputs.ref }}

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1
        # action-build 默认在 LXD 容器里跑 snapcraft,产物路径输出到
        # steps.build.outputs.snap。strict + gnome extension 自动 attach
        # gnome-42-2204 + gtk-common-themes content snaps,无需手动挂。

      - name: Upload .snap as workflow artifact
        # 即便 publish 走 store,也保留 artifact 用于离线分发 / 调试
        # (`snap install --dangerous file.snap`)。retention 7 天够用。
        uses: actions/upload-artifact@v7
        with:
          name: uniclipboard-amd64-snap
          path: ${{ steps.build.outputs.snap }}
          retention-days: 7
          if-no-files-found: error

      - name: Check snap store credentials
        id: check-creds
        if: ${{ steps.snap-meta.outputs.release == 'true' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "::warning::SNAPCRAFT_STORE_CREDENTIALS secret missing — skipping publish."
            echo "::warning::Run \`snapcraft export-login --snaps=uniclipboard --acls package_upload\` and add it to repo secrets to enable publishing."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to snap store
        if: ${{ steps.snap-meta.outputs.release == 'true' && steps.check-creds.outputs.publish == 'true' }}
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: ${{ steps.snap-meta.outputs.channel }}
