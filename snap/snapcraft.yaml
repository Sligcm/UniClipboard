name: uniclipboard
base: core22
adopt-info: uniclipboard

summary: Encrypted peer-to-peer clipboard sync between your devices
description: |
  UniClipboard syncs your clipboard securely across all your devices on
  the local network. End-to-end encrypted and powered by iroh QUIC —
  no clouds, no accounts, no third-party servers, just direct
  peer-to-peer sync.

  Pair your devices once via the in-app QR code, then anything you copy
  on one device — text, images, or files — is automatically available
  on the others.

  Currently distributed as alpha. A bundled background daemon handles sync.

license: AGPL-3.0-only
website: https://uniclipboard.app
source-code: https://github.com/UniClipboard/UniClipboard
issues: https://github.com/UniClipboard/UniClipboard/issues
contact: https://github.com/UniClipboard/UniClipboard/issues

# strict + gnome extension。base=core22 决定 binary 链接 glibc 2.35,gnome
# extension (gnome-42-2204) 提供 webkit2gtk-4.1 + libsoup-3.0 + 完整 GTK
# stack。snap 跑在 mount namespace 里,binary 看到的 /lib 是 snap 内部的,
# 跟 host 完全解耦 —— Ubuntu 20.04 / RHEL 9 / openSUSE Leap 这些老
# distro 上 host 没有 webkit2gtk-4.1 也无所谓。
grade: stable
confinement: strict

architectures:
  - build-on: amd64
    build-for: amd64
  - build-on: arm64
    build-for: arm64

apps:
  uniclipboard:
    command: usr/bin/uniclipboard
    extensions: [gnome]
    desktop: usr/share/applications/uniclipboard.desktop
    common-id: app.uniclipboard.desktop
    # plug 列表覆盖 GUI + 全局剪贴板 + LAN P2P 同步 + 本地配置/数据 +
    # 文件传输场景。剪贴板事件从 GTK clipboard API 取,strict snap 通过
    # wayland / x11 plug 拿到 host compositor selection;daemon 监听
    # 系统剪贴板变化跟原生 .deb 行为一致。
    #
    # `password-manager-service`: daemon 启动期通过 secret-service D-Bus
    # API (org.freedesktop.Secret.Service / GNOME Keyring / KWallet 等)
    # 取本地身份的 KEK。该 plug **不会** auto-connect,首装后需要 manual
    # `snap connect uniclipboard:password-manager-service`;未连接时
    # uc-platform::capability 仍会探测到 desktop 然后走 system keyring,
    # DBus 被 AppArmor 拒后直接 daemon 启动失败 ——
    # uc-platform::secure_storage 的 file-based fallback 仅在 "no desktop
    # detected" 路径触发。要在 snap store 启用 auto-connect 需在 snapcraft
    # forum 提 request。
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - unity7
      - network
      - network-bind
      - home
      - removable-media
      - mount-observe
      - password-manager-service

parts:
  uniclipboard:
    plugin: nil
    source: .
    source-type: local
    # core22 build env = Ubuntu 22.04 仓库,libwebkit2gtk-4.1 等 dev 包都
    # 在 main / universe 里。runtime 阶段这些 .so 由 gnome extension 提供,
    # stage-packages 只 stage 几个 extension 没覆盖到的辅助库 (例如
    # libayatana-appindicator3 系统托盘绘制)。
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libsoup-3.0-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - patchelf
      - cmake
      - clang
      - pkg-config
      - curl
      - file
      - desktop-file-utils
      - xdg-utils
      - jq
      - unzip
      - ca-certificates
    stage-packages:
      - libayatana-appindicator3-1
      - librsvg2-2
    build-environment:
      # NOTE: build-environment 的值会被 craft-parts 用双引号包裹后注入构建
      # 脚本(export KEY="VALUE"),且不转义值里的内层字符。所以两类值都不能
      # 放这里,必须改在 override-build 内用 export 设:
      #   1) 含 $VAR 的(如 PATH 的 $HOME)—— 会被 shell 提前展开成错误的值;
      #   2) 含双引号的(如 TAURI_CONFIG 的 JSON)—— 内层 " 会被 shell 吃掉,
      #      {"bundle":{"externalBin":[]}} 塌成 {bundle:{externalBin:[]}},
      #      tauri build.rs 解析报 "key must be a string at line 1 column 2"。
      - CARGO_TERM_COLOR: never
      - SNAP_BUILD: '1'
    override-pull: |
      craftctl default
      # snap 版本号 = package.json.version + "-snap" 后缀,snap store
      # 需要 SemVer-like 字符串。snap 跟 .deb 是同一份代码,但产物
      # 标识不同,加 suffix 区分上传记录。
      VERSION="$(jq -r .version "${CRAFT_PART_SRC}/package.json")"
      craftctl set version="${VERSION}"
    override-build: |
      set -euo pipefail

      # 装 Bun (前端 bundler) 和 Rust stable —— 跟 alpha-build.yml 对齐。
      # core22 自带 nodejs/npm 但不带 bun,bun-version 在 GHA 那边用
      # latest,这里也 latest 保持一致。
      curl -fsSL https://bun.sh/install | bash
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
        | sh -s -- -y --profile minimal --default-toolchain stable
      export PATH="$HOME/.bun/bin:$HOME/.cargo/bin:$PATH"

      # 1) 前端构建 —— vite 把 src/ 编到 dist/,Tauri 的 build.rs (调
      # tauri_build::build()) 在 cargo build 时把 dist/ 嵌进 binary。
      bun install --frozen-lockfile
      bun run build

      # 2) 后端构建 —— 直接 cargo build,绕过 tauri-cli (不需要 .deb /
      # AppImage / updater signing 这些 snap 用不到的逻辑)。binary 名字
      # 由 src-tauri/Cargo.toml 的 [package].name 决定 = "uniclipboard"。
      #
      # `--features custom-protocol` 必传：开了 Tauri 才走 `tauri://localhost`
      # 协议从嵌入的 frontendDist 加载 webview;不开的话 release binary 仍
      # 尝试 devUrl (http://localhost:1420) → 用户看到 "Could not connect
      # to localhost: Connection refused"。`bun run tauri build` 默认会开
      # 它,我们绕过 tauri-cli 所以必须手动加。
      #
      # ADR-008 D13 给 tauri.conf.json 加了 externalBin: ["binaries/uniclipd"],
      # build.rs 里的 tauri_build::build() 会在编 GUI 时强制要求
      # src-tauri/binaries/uniclipd-<triple> 存在并把它拷进 bundle。但 snap 用
      # 纯 cargo build(不走 tauri-cli bundling),且下面把 uniclipd 从
      # target/release 直接 install 到 usr/bin —— 根本不依赖 Tauri 的 sidecar
      # 暂存机制。用 TAURI_CONFIG 作 JSON Merge Patch 把 externalBin 清空(空数组
      # 替换整个列表),让 build script 既不要求也不拷贝它。与 coverage.yml /
      # pr-check.yml 同款,但**必须**在这里用单引号 export —— 放进
      # build-environment 会被 craft-parts 的双引号注入吞掉内层引号(详见上面
      # build-environment 的 NOTE)。
      export TAURI_CONFIG='{"bundle":{"externalBin":[]}}'
      cd src-tauri
      cargo build --release --locked --bin uniclipboard --features custom-protocol
      # ADR-008 D13: also build the standalone `uniclipd` daemon, installed next
      # to the GUI below so the GUI spawns it as a sibling ($SNAP/usr/bin/uniclipd).
      # It needs no custom-protocol (no webview) and shares the GUI crate graph,
      # so this build is mostly incremental. build-packages already has cmake +
      # clang for aws-lc-sys, which uniclipd pulls via iroh just like the GUI.
      #
      # `-p uc-daemon` is REQUIRED: the `uniclipd` bin lives in the uc-daemon
      # workspace member, not in the `uniclipboard` package we cd'd into above.
      # Without it cargo errors "no bin target named `uniclipd` in default-run
      # packages". Matches scripts/prepare-daemon-sidecar.mjs (`cargo build -p
      # uc-daemon --bin uniclipd`), the same invocation CI uses for the sidecar.
      cargo build --release --locked -p uc-daemon --bin uniclipd
      cd ..

      # 3) 安装到 snap install 目录。strict snap 启动时 mount 这个目录
      # 到 /usr,所以路径必须以 usr/ 开头。
      install -Dm755 src-tauri/target/release/uniclipboard \
        "${CRAFT_PART_INSTALL}/usr/bin/uniclipboard"
      # ADR-008 D13: ship the daemon next to the GUI so it spawns as a sibling.
      install -Dm755 src-tauri/target/release/uniclipd \
        "${CRAFT_PART_INSTALL}/usr/bin/uniclipd"
      install -Dm644 snap/local/uniclipboard.desktop \
        "${CRAFT_PART_INSTALL}/usr/share/applications/uniclipboard.desktop"
      install -Dm644 src-tauri/icons/icon.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/256x256/apps/uniclipboard.png"
      install -Dm644 src-tauri/icons/128x128.png \
        "${CRAFT_PART_INSTALL}/usr/share/icons/hicolor/128x128/apps/uniclipboard.png"
