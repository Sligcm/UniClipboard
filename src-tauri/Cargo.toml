[package]
name = "uniclipboard"
version = "0.6.0"
license.workspace = true
description = "一个剪切板同步工具"
authors = ["mkdir700@gmail.com"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "uniclipboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri shell entry — bin crate only constructs the bootstrap context and the
# tauri::Context (the latter via the generate_context! macro that requires the
# bin's tauri.conf.json), then hands control to uc-tauri which owns all the
# Tauri-specific plumbing (commands, plugins, builder/setup, run loop).
uc-bootstrap = { path = "crates/uc-bootstrap" }
uc-tauri = { path = "crates/uc-tauri" }

# Required for the tauri::generate_context!() macro the bin still calls.
tauri = { workspace = true }

# Tauri plugin crates listed here so `tauri-build` can validate capability
# permission identifiers against them at compile time. The plugins are
# initialized inside `uc_tauri::run`, not directly in this bin.
tauri-plugin-notification = "2"
tauri-plugin-opener = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-stronghold = "2"

# tauri::generate_context!() expands to code that references serde_json by path.
serde_json = "1"

[features]
cargo-clippy = []

[profile.release]
panic = "abort"   # Strip expensive panic clean-up logic
codegen-units = 1 # Compile crates one after another so the compiler can optimize better
lto = true        # Enables link to optimizations
opt-level = "z"   # Optimize for binary size
strip = true      # Remove debug symbols

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-updater = "2"

[dev-dependencies]
tempfile = "3.2"
tokio = { version = "1", features = ["full"] }

[workspace]
members = [
  "crates/uc-core",
  "crates/uc-application",
  "crates/uc-platform",
  "crates/uc-infra",
  "crates/uc-tauri",
  "crates/uc-observability",
  "crates/uc-bootstrap",
  "crates/uc-daemon-contract",
  "crates/uc-daemon-local",
  "crates/uc-webserver",
  "crates/uc-desktop",
  "crates/uc-daemon",
  "crates/uc-cli",
  "crates/uc-cli-macros",
  "crates/uc-daemon-client",
]
resolver = "2"

[workspace.package]
version = "0.6.0"
license = "AGPL-3.0-only"

# Dependencies for workspace crates, mainly for tauri plugins
[workspace.dependencies]
tauri = { version = "2", features = ["tray-icon", "macos-private-api"] }
tauri-plugin-autostart = "2"
