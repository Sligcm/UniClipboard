[package]
name = "uc-cli"
version.workspace = true
license.workspace = true
edition = "2021"
description = "Command-line interface for UniClipboard"

[[bin]]
name = "uniclip"
path = "src/main.rs"

[dependencies]
uc-bootstrap = { path = "../uc-bootstrap" }
uc-observability = { path = "../uc-observability" }
uc-core = { path = "../uc-core" }
uc-daemon-client = { path = "../uc-daemon-client" }
uc-daemon-contract = { path = "../uc-daemon-contract" }
uc-daemon-local = { path = "../uc-daemon-local" }
# Hidden `probe` subcommand group reads/writes the OS clipboard directly
# (replaces the standalone `clipboard-probe` binary). Diagnostic only.
# Goes through `uc_platform::clipboard::build_event_loop`, so it inherits
# whichever native backend the daemon picks (Wayland data-control / x11rb /
# clipboard_rs on macOS/Windows) without a direct `clipboard-rs` dep.
uc-platform = { path = "../uc-platform" }
tokio = { version = "1", features = ["full"] }
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
base64 = "0.22"
bytes = "1.7"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "rustls-tls-webpki-roots"] }
console = "0.15"
indicatif = "0.17"
# Themed Confirm / Input prompts. `default-features = false` drops the
# `editor` and `password` extras â€” we keep `ui::password` (hand-rolled
# masked-feedback renderer) so the LAN-risk and label/username prompts
# are the only consumers.
dialoguer = { version = "0.11", default-features = false }
libc = "0.2"
hostname = "0.4"
uc-application = { path = "../uc-application" }
# Slice 2 Phase 3 Â· T9 â€” `send` constructs a single-text-representation
# `SystemClipboardSnapshot` and dispatches via `dispatch_snapshot`. V3
# envelope encoding + snapshot_hash derivation happen inside
# `ClipboardSyncFacade`, so `bytes` + `sha2` are no longer needed by CLI
# directly. `watch` reads `InboundNotice.plaintext: Bytes` which is
# re-exported from `uc-core`'s dependency chain.
# Installs the default `rustls` crypto provider process-wide at `main()`
# start â€” iroh-quinn and reqwest both consume rustls 0.23+, which now
# requires an explicit `CryptoProvider` before the first TLS handshake.
# Without this the first party to set up a `ClientConfig` (today iroh)
# leaves later consumers (reqwest â†’ rendezvous) with a provider that
# surfaces certs as `CertificateError::BadEncoding`.
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
uuid = { version = "1.10.0", features = ["v4"] }

[dev-dependencies]
axum = { version = "0.7", features = ["ws", "tokio", "http1", "http2"] }
tower = { version = "0.5", features = ["util"] }
tempfile = "3"
