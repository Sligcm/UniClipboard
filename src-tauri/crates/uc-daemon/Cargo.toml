[package]
name = "uc-daemon"
version.workspace = true
edition = "2021"
description = "Headless daemon for UniClipboard — background clipboard sync without GUI"

[[bin]]
name = "uniclipboard-daemon"
path = "src/main.rs"

[lib]
name = "uc_daemon"
path = "src/lib.rs"

[dependencies]
uc-bootstrap = { path = "../uc-bootstrap" }
uc-app = { path = "../uc-app" }
uc-core = { path = "../uc-core" }
uc-infra = { path = "../uc-infra" }
uc-platform = { path = "../uc-platform" }
uc-observability = { path = "../uc-observability" }
clipboard-rs = { version = "0.3.3", features = ["default"] }
axum = { version = "0.7", features = ["ws", "tokio", "http1", "http2"] }
tokio = { version = "1", features = ["full", "test-util"] }
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
blake3 = "1"
jsonwebtoken = { version = "10", default-features = false, features = ["rust_crypto"] }
tracing = "0.1"
futures-util = "0.3"
url = "2"
utoipa = { version = "4", features = ["uuid", "chrono", "url"] }
utoipa-axum = "0.2"
utoipa-swagger-ui = { version = "7", features = ["axum"] }
serde_with = "3.18.0"
base64 = "0.22"

[dev-dependencies]
tempfile = "3"
chrono = { version = "0.4", default-features = true }
tower = { version = "0.5", features = ["util"] }
tokio-tungstenite = "0.24"
percent-encoding = "2"
